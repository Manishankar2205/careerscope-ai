{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-6">💼 LinkedIn Optimizer</h1>

  <div class="space-y-6">
    <div class="bg-slate-800 p-6 rounded-lg">
      <h2 class="text-xl font-bold mb-3 text-cyan-400">Optimized Headline</h2>
      <p class="text-lg bg-slate-900 p-4 rounded">{{ headline }}</p>
      <button onclick="navigator.clipboard.writeText('{{ headline }}')" class="mt-3 bg-cyan-600 px-4 py-2 rounded text-sm">
        Copy Headline
      </button>
    </div>

    <div class="bg-slate-800 p-6 rounded-lg">
      <h2 class="text-xl font-bold mb-3 text-cyan-400">Optimized Summary</h2>
      <pre class="whitespace-pre-wrap bg-slate-900 p-4 rounded text-sm">{{ summary }}</pre>
      <button onclick="navigator.clipboard.writeText(`{{ summary }}`)" class="mt-3 bg-cyan-600 px-4 py-2 rounded text-sm">
        Copy Summary
      </button>
    </div>

    <div class="bg-yellow-900/20 border border-yellow-600 p-4 rounded">
      <p class="text-yellow-300"><b>Pro Tip:</b> Update your LinkedIn with these. Recruiters search ki keywords match avtai!</p>
    </div>
  </div>
</div>
{% endblock %}
