<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerScope - Saved Jobs</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 260px;
            background: #1e293b;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            border-right: 1px solid #334155;
        }
        .logo {
            font-size: 1.5em;
            font-weight: 700;
            background: linear-gradient(90deg, #00ff88, #00aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            padding: 0 10px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 15px;
            margin: 4px 0;
            border-radius: 10px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-item:hover,.nav-item.active {
            background: #334155;
            color: #00ff88;
        }
        .nav-item.active {
            border-left: 3px solid #00ff88;
        }
        .nav-divider {
            height: 1px;
            background: #334155;
            margin: 15px 0;
        }
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 30px;
            background: #0f172a;
        }
        .page-header h1 {
            font-size: 2.2em;
            font-weight: 700;
            background: linear-gradient(90deg, #00ff88, #00aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .job-card {
            background: #1e293b;
            border: 1px solid #ffaa00;
            border-radius: 15px;
            padding: 25px;
            margin: 15px 0;
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #94a3b8;
        }
        .empty-state h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
        }
        .apply-btn {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(90deg, #00ff88, #00aaff);
            color: #0f172a;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            margin: 5px;
        }
        .remove-btn {
            background: rgba(255,68,68,0.2);
            border: 1px solid #ff4444;
            color: #ff8888;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">CareerScope</div>
        <a href="{{ url_for('skill_analysis') }}" class="nav-item">📊 <span>Skill Analysis</span></a>
        <a href="{{ url_for('job_matches') }}" class="nav-item">💼 <span>Job Matches</span></a>
        <a href="{{ url_for('saved_jobs') }}" class="nav-item active">💾 <span>Saved Jobs</span></a>
        <a href="{{ url_for('export_pdf') }}" target="_blank" class="nav-item">📄 <span>Export PDF</span></a>
        <div class="nav-divider"></div>
        <a href="{{ url_for('job_matches') }}" class="nav-item">← <span>Back to Jobs</span></a>
        <a href="{{ url_for('logout') }}" class="nav-item">🚪 <span>Logout</span></a>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1>💾 Saved Jobs</h1>
            <p style="color: #94a3b8;">Your bookmarked job opportunities</p>
        </div>

        <div id="savedJobsContainer"></div>
    </div>

    <script>
        const allJobs = {{ jobs | tojson }};
        const savedJobIds = JSON.parse(localStorage.getItem('savedJobs') || '[]');
        const container = document.getElementById('savedJobsContainer');

        function renderSavedJobs() {
            if (savedJobIds.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No saved jobs yet 📌</h3>
                        <p>Go to Job Matches and click 💾 Save to bookmark jobs</p>
                        <a href="{{ url_for('job_matches') }}" style="display: inline-block; margin-top: 20px; padding: 12px 30px; background: linear-gradient(90deg, #00ff88, #00aaff); color: #0f172a; border-radius: 10px; text-decoration: none; font-weight: 700;">Browse Jobs</a>
                    </div>
                `;
                return;
            }

            const savedJobs = allJobs.filter(job => savedJobIds.includes(job.id));
            
            if (savedJobs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No saved jobs found</h3>
                        <p>Your saved jobs may have been updated</p>
                        <a href="{{ url_for('job_matches') }}" style="display: inline-block; margin-top: 20px; padding: 12px 30px; background: linear-gradient(90deg, #00ff88, #00aaff); color: #0f172a; border-radius: 10px; text-decoration: none; font-weight: 700;">Browse Jobs</a>
                    </div>
                `;
                return;
            }

            let html = '';
            savedJobs.forEach(job => {
                const company = job.company_name || 'N/A';
                const location = job.location || 'Not Specified';
                
                html += `
                <div class="job-card" id="saved-job-${job.id}">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px;">
                        <div>
                            <div style="font-size: 1.4em; font-weight: 700; color: #00ff88; margin-bottom: 5px;">${job.title}</div>
                            <div style="color: #94a3b8; font-size: 0.9em;">${job.category} • ${location}</div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-size: 2em; font-weight: 700; color: #00ff88;">${job.match}%</div>
                            <div style="color: #94a3b8; font-size: 0.85em;">Match</div>
                        </div>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 20px 0; padding: 20px 0; border-top: 1px solid #334155;">
                        <div style="text-align: center;">
                            <div style="color: #94a3b8; font-size: 0.85em;">Salary</div>
                            <div style="font-size: 1.2em; font-weight: 600;">₹${job.salary} LPA</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="color: #94a3b8; font-size: 0.85em;">Risk</div>
                            <div style="font-size: 1.2em; font-weight: 600; color: ${job.risk < 30? '#00ff88' : job.risk < 60? '#ffc107' : '#ff4444'}">${job.risk}%</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="color: #94a3b8; font-size: 0.85em;">Company</div>
                            <div style="font-size: 1.2em; font-weight: 600;">${company}</div>
                        </div>
                    </div>
                    <div style="text-align: center;">
                        <a href="${job.apply_url}" target="_blank" class="apply-btn">🚀 Apply Now</a>
                        <button onclick="removeSavedJob(${job.id})" class="remove-btn">🗑️ Remove</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function removeSavedJob(jobId) {
            const index = savedJobIds.indexOf(jobId);
            if (index > -1) {
                savedJobIds.splice(index, 1);
                localStorage.setItem('savedJobs', JSON.stringify(savedJobIds));
                renderSavedJobs();
            }
        }

        renderSavedJobs();
    </script>
</body>
</html>
