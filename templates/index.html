<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerScope AI Pro - Upload</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            min-height: 100vh; padding: 20px; color: white;
            display: flex; align-items: center; justify-content: center;
        }
.container { max-width: 700px; width: 100%; }
.glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            animation: fadeIn 0.6s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-size: 2.8em; font-weight: 700;
            background: linear-gradient(90deg, #00ff88, #00aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-align: center;
        }
.subtitle { color: #b8b8d1; font-size: 1.1em; margin-bottom: 40px; text-align: center; }
.upload-zone {
            border: 3px dashed rgba(0, 255, 136, 0.5);
            padding: 40px;
            text-align: center;
            border-radius: 15px;
            background: rgba(0, 255, 136, 0.05);
            transition: all 0.3s;
            cursor: pointer;
            margin-bottom: 20px;
        }
.upload-zone:hover {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            transform: scale(1.02);
        }
        input[type=file] { display: none; }
.checkbox-wrapper {
            margin: 25px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            justify-content: center;
        }
.checkbox-wrapper input[type=checkbox] {
            width: 25px; height: 25px; cursor: pointer;
            accent-color: #00ff88;
        }
.analyze-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(90deg, #00ff88, #00aaff);
            color: #0f0c29;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
        }
.analyze-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.5);
        }
.analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
.error-box {
            background: rgba(255, 68, 68, 0.15);
            border: 2px solid #ff4444;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            color: #ff8888;
            font-weight: 500;
            text-align: center;
        }
.divider {
            text-align: center;
            margin: 25px 0;
            color: #b8b8d1;
            font-weight: 600;
            position: relative;
        }
.divider::before,.divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(255,255,255,0.2);
        }
.divider::before { left: 0; }
.divider::after { right: 0; }
      textarea {
            width: 100%; height: 120px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 12px;
            padding: 15px; color: white;
            font-size: 15px; font-family: 'Poppins';
            resize: vertical; outline: none;
            transition: 0.3s;
        }
      textarea:focus { border-color: #00ff88; }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <h1>⚡ CareerScope AI Pro</h1>
            <p class="subtitle">Upload Resume & Get Instant Career Analysis</p>

            {% if error %}
            <div class="error-box">⚠️ {{ error }}</div>
            {% endif %}

            <form method="post" enctype="multipart/form-data" id="uploadForm">
                <div class="upload-zone" onclick="document.getElementById('resume').click()">
                    <svg width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <h3 style="margin-top: 20px; color: #00ff88;">Upload Resume PDF</h3>
                    <p style="color: #b8b8d1; margin-top: 10px;">Required • Max 16MB</p>
                    <input type="file" name="resume" id="resume" accept=".pdf" required>
                    <p id="fileName" style="margin-top: 15px; color: #00ff88; font-weight: 600;"></p>
                </div>

                <label style="color: #00ff88; font-size: 16px; font-weight: 600; display: block; margin-bottom: 10px;">
                    📋 Job Description (Optional)
                </label>
                <textarea
                    name="job_description"
                    placeholder="Paste JD here to compare with your resume..."
                ></textarea>

                <div class="divider">OR</div>

                <div class="upload-zone" style="padding: 25px; border-color: rgba(0,170,255,0.5);" onclick="document.getElementById('jd_pdf').click()">
                    <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#00aaff" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                    </svg>
                    <h4 style="margin-top: 15px; color: #00aaff;">Upload JD PDF</h4>
                    <input type="file" name="jd_pdf" id="jd_pdf" accept=".pdf">
                    <p id="jdFileName" style="margin-top: 10px; color: #00aaff; font-weight: 600;"></p>
                </div>

                <div class="checkbox-wrapper">
                    <input type="checkbox" name="it_only" id="itOnly" checked>
                    <label for="itOnly">🎯 IT Jobs Only</label>
                </div>

                <button type="submit" class="analyze-btn" id="analyzeBtn">🚀 Analyze Now</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('resume').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || '';
            document.getElementById('fileName').textContent = fileName? `✓ ${fileName}` : '';
        });
        document.getElementById('jd_pdf').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || '';
            document.getElementById('jdFileName').textContent = fileName? `✓ ${fileName}` : '';
        });
        document.getElementById('uploadForm').addEventListener('submit', function() {
            const btn = document.getElementById('analyzeBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Analyzing... Please Wait';
        });
    </script>
</body>
</html>
