<!DOCTYPE html>
<html>
<head>
    <title>Login - CareerScope</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] flex items-center justify-center min-h-screen">
    <div class="bg-[#1e293b] p-8 rounded-lg w-96 border border-gray-700">
        <h2 class="text-2xl font-bold text-white mb-6">Login - CareerScope</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <p class="text-{{ 'red' if category == 'error' else 'green' }}-400 text-sm mb-4">{{ message }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST">
            <input name="email" class="w-full p-3 mb-4 bg-[#0f172a] border border-gray-600 rounded text-white" type="email" placeholder="Email" required>
            <input name="password" class="w-full p-3 mb-4 bg-[#0f172a] border border-gray-600 rounded text-white" type="password" placeholder="Password" required>
            <button type="submit" class="w-full p-3 bg-[#22d3ee] text-black font-bold rounded hover:bg-[#06b6d4]">Login</button>
        </form>
        <div class="mt-4 text-center">
            <a href="/forgot-password" class="text-[#22d3ee] text-sm">Forgot Password?</a>
        </div>
        <p class="text-gray-400 text-sm mt-4 text-center">
            New user? <a href="/register" class="text-[#22d3ee]">Register here</a>
        </p>
    </div>
</body>
</html>
