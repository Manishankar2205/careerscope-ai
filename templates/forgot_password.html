<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - CareerScope</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] flex items-center justify-center min-h-screen">
    <div class="bg-[#1e293b] p-8 rounded-lg w-96 border border-gray-700">
        <h2 class="text-2xl font-bold text-white mb-2">Forgot Password</h2>
        <p class="text-gray-400 text-sm mb-6">Enter email to get reset link</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <p class="text-blue-400 text-sm mb-4">{{ message }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST">
            <input name="email" class="w-full p-3 mb-4 bg-[#0f172a] border border-gray-600 rounded text-white" type="email" placeholder="Email" required>
            <button type="submit" class="w-full p-3 bg-[#22d3ee] text-black font-bold rounded hover:bg-[#06b6d4]">Send Reset Link</button>
        </form>
        <div class="mt-4 text-center">
            <a href="/login" class="text-[#22d3ee] text-sm">Back to Login</a>
        </div>
    </div>
</body>
</html>
